term:
  width: 80
  height: 54
  encoding: utf8
  fill: " :BEE1B24"

defaults:
  inputFormat: ansi
  inputEncoding: utf8
output:
  format: neotex

layers:
  - name: ballot-vote
    x: 1
    y: 1
    alignH: center
    file: ballot-vote.neo
    inputFormat: neotex
  - name: money
    x: 3
    y: 36
    alignH: center
    cmd: bit -fit-scales -1,0,1,2  -fit-width 76 -fit-priority width -fit-limit 1 -font glispbold "MONEY"
  - name: as
    x: 3
    y: 44
    alignH: center
    cmd: bit -fit-scales -1 -fit-width 76 -fit-priority width -fit-limit 1 -font glispbold "AS"
  - name: protest
    x: 3
    y: 49
    alignH: center
    cmd: bit -fit-scales -1,0,1,2  -fit-width 76 -fit-priority width -fit-limit 1 -font glispbold "PROTEST"
